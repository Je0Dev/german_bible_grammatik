name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends texlive-latex-base texlive-latex-extra texlive-lang-german texlive-pictures texlive-science texlive-fonts-extra

      - name: Compile LaTeX
        run: |
          pdflatex -interaction=nonstopmode master.tex
          pdflatex -interaction=nonstopmode master.tex
          pdflatex -interaction=nonstopmode master.tex

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site
          path: .

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4